<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIRELINE — Forest Fire Risk Prediction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#161D14; --bg-panel:#1F2A1B; --ember:#E8592C; --amber:#D9A441;
    --moss:#7A8F6E; --paper:#EDE8DA; --ash:#8B8F82; --line: rgba(237,232,218,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg-deep); color:var(--paper); font-family:'Inter',sans-serif; line-height:1.5;}
  header{display:flex; align-items:center; justify-content:space-between; padding:20px 48px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand span{font-family:'Fraunces',serif; font-weight:600; font-size:1.25rem;}
  section{padding:0 48px;}
  .hero{padding-top:20px; padding-bottom:60px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--amber); text-transform:uppercase; margin-bottom:18px;}
  h1{font-family:'Fraunces',serif; font-weight:500; font-size:clamp(2rem,4.5vw,3.5rem); max-width:820px;}
  h1 em{font-style:italic; color:var(--ember); font-weight:300;}
  .lede{max-width:560px; color:var(--ash); margin-top:20px; margin-bottom:36px;}
  .controls{display:flex; gap:16px; align-items:center; margin-bottom:24px; flex-wrap:wrap;}
  select, input{
    background:var(--bg-panel); color:var(--paper); border:1px solid var(--line);
    padding:10px 14px; border-radius:8px; font-family:'IBM Plex Mono',monospace; font-size:0.85rem;
  }
  .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:20px;}
  .card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:22px;
    border-left:4px solid var(--moss);
  }
  .card.High{border-left-color:var(--ember);}
  .card.Medium{border-left-color:var(--amber);}
  .card.Low{border-left-color:var(--moss);}
  .card h3{font-family:'Fraunces',serif; font-size:1.2rem; margin-bottom:8px;}
  .card .proba{font-family:'IBM Plex Mono',monospace; font-size:2rem; font-weight:600;}
  .card .tag{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:0.7rem;
    text-transform:uppercase; padding:3px 10px; border-radius:20px; margin-top:8px;
  }
  .tag.High{background:rgba(232,89,44,0.15); color:var(--ember);}
  .tag.Medium{background:rgba(217,164,65,0.15); color:var(--amber);}
  .tag.Low{background:rgba(122,143,110,0.15); color:var(--moss);}
  .card .actual{color:var(--ash); font-size:0.8rem; margin-top:10px;}
  footer{padding:40px 48px; border-top:1px solid var(--line); color:var(--ash); font-family:'IBM Plex Mono',monospace; font-size:0.72rem;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2C9 7 6 9 6 13a6 6 0 0 0 12 0c0-1.5-.6-2.7-1.4-4 .1 1.4-.5 2.3-1.3 2.8C16 9 14.5 6.5 12 2Z" fill="#E8592C"/></svg>
    <span>FIRELINE</span>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">Live model output · 2024 test season</div>
  <h1>Forest fire risk, <em>district by district.</em></h1>
  <p class="lede">Select a date to see predicted fire risk for each district, based on our trained model.</p>

  <div class="controls">
    <label for="dateSelect">Choose a date:</label>
    <select id="dateSelect"></select>
  </div>

  <div class="grid" id="cardsContainer">
    <!-- Cards get filled in by JavaScript -->
  </div>
</section>

<footer>
  <span>Data: NASA FIRMS · Open-Meteo · Earth Engine (NDVI/SRTM) · Model: Random Forest</span>
</footer>

<script>
  const dateSelect = document.getElementById("dateSelect");
  const cardsContainer = document.getElementById("cardsContainer");

  // Step 1: get the list of available dates from Flask, fill the dropdown
  fetch("/api/predictions")
    .then(response => response.json())
    .then(data => {
      data.dates_available.forEach(date => {
        const option = document.createElement("option");
        option.value = date;
        option.textContent = date;
        dateSelect.appendChild(option);
      });
      dateSelect.value = data.default_date;
      loadPredictions(data.default_date);
    });

  // Step 2: when the dropdown changes, fetch that date's predictions
  dateSelect.addEventListener("change", () => {
    loadPredictions(dateSelect.value);
  });

  // Step 3: this function asks Flask for one date's data, then builds cards
  function loadPredictions(date) {
    fetch(`/api/predictions/${date}`)
      .then(response => response.json())
      .then(rows => {
        cardsContainer.innerHTML = "";
        rows.forEach(row => {
          const card = document.createElement("div");
          card.className = `card ${row.risk_level}`;
          card.innerHTML = `
            <h3>${row.district}</h3>
            <div class="proba">${Math.round(row.predicted_proba * 100)}%</div>
            <span class="tag ${row.risk_level}">${row.risk_level} risk</span>
            <div class="actual">${row.actual_fire === 1 ? "Fire actually occurred" : "No fire occurred"}</div>
          `;
          cardsContainer.appendChild(card);
        });
      });
  }
</script>

</body>
</html>
